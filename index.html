<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ART.link · Portal (6e)</title>

<style>
body { background:#000; color:#fff; font-family:Consolas; text-align:center; padding-top:20vh; }
.art { font-size:60px; color:#0ff; animation:pulse 2s infinite; }
.link { font-size:40px; color:#0f0; margin-top:10px; }
.status { margin-top:20px; color:#ff0; }
@keyframes pulse {
  0% { opacity:0.4; transform:scale(0.9); }
  50% { opacity:1; transform:scale(1.2); }
  100% { opacity:0.4; transform:scale(0.9); }
}
</style>

<script type="module">
import { loadID } from "./engine/id-engine.js";

window.addEventListener("DOMContentLoaded", async () => {
  const status = document.getElementById("status");
  const count = await loadID();
  status.textContent = "Portal aktiv · " + count + " ID‑Nodes geladen.";
});
</script>

</head>
<body>

<div class="art">ART</div>
<div class="link">link</div>
<div id="status" class="status">Lade Portal…</div>

</body>
</html>
