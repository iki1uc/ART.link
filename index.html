<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ART.link · Portal (6e)</title>

<style>
body { background:#000; color:#fff; font-family:Consolas; text-align:center; padding-top:20vh; }
.art { font-size:60px; color:#0ff; animation:pulse 2s infinite; }
.link { font-size:40px; color:#0f0; margin-top:10px; }
.status { margin-top:20px; color:#ff0; }
@keyframes pulse {
  0% { opacity:0.4; transform:scale(0.9); }
  50% { opacity:1; transform:scale(1.2); }
  100% { opacity:0.4; transform:scale(0.9); }
}
</style>

<script type="module">
async function loadPortal() {
  const status = document.getElementById("status");

  try {
    const res = await fetch("ID.json");
    if (!res.ok) throw new Error("ID.json fehlt");
    const data = await res.json();

    status.textContent = "Portal aktiv · " + Object.keys(data).length + " ID‑Nodes geladen.";
  } catch (e) {
    status.textContent = "Fehler: " + e.message;
  }
}

window.addEventListener("DOMContentLoaded", loadPortal);
</script>

</head>
<body>

<div class="art">ART</div>
<div class="link">link</div>
<div id="status" class="status">Lade Portal…</div>

</body>
</html>
