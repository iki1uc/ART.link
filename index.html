<script type="module">
import ID from "./ID.json" assert { type:"json" };
import NC from "./NC.json" assert { type:"json" };
import ORBIT from "./orbit.json" assert { type:"json" };

import { OrbitHeatmap3D } from "./orbit-engine.js";
import { NC2SyncPanel } from "./sync-engine.js";
import { IDVisualizer } from "./id-engine.js";
import { CoreChainConnector } from "./core-chain-engine.js";
import { BridgeNC2Connector } from "./bridge-engine.js";
import { AutoGenerator } from "./generator-engine.js";
import { verifyNC } from "./NC.verify.js";

// ------------------------------------------------------
// 3D Szene starten
// ------------------------------------------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 6;

// ------------------------------------------------------
// Module starten
// ------------------------------------------------------
OrbitHeatmap3D(scene);     // Orbit‑Heatmap 3D
IDVisualizer(scene);       // ID‑Sphere
NC2SyncPanel();            // NC² Panel
BridgeNC2Connector();      // Bridge koppeln
AutoGenerator();           // Generator starten

// ------------------------------------------------------
// NC.verify starten
// ------------------------------------------------------
setInterval(() => {
    verifyNC();
}, 500);

// ------------------------------------------------------
// Render‑Loop
// ------------------------------------------------------
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>
